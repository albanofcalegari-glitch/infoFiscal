<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoFiscal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900">

    <div class="fixed inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1556742044-3c52d6e88c62?auto=format&fit=crop&w=1920&q=80"
             alt="" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-slate-900/60"></div>
    </div>

    <main class="relative z-10 flex items-center justify-center min-h-screen px-4">
        <div class="glass rounded-xl shadow-xl p-10 text-center max-w-md">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">InfoFiscal</h1>
            <p class="text-slate-500">Tu aplicacion Flask esta funcionando correctamente.</p>
        </div>

</html>
