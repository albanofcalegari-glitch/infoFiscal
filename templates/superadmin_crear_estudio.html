{% extends "superadmin_base.html" %}
{% block title %}Nuevo Estudio{% endblock %}

{% block content %}
<div class="flex items-center gap-2 text-sm text-slate-500 mb-4">
    <a href="{{ url_for('superadmin_panel') }}" class="hover:text-slate-300 transition">Estudios</a>
    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
    </svg>
    <span class="text-slate-300">Nuevo Estudio</span>
</div>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-white mb-6">Registrar Nuevo Estudio</h1>

    <form method="POST" action="{{ url_for('superadmin_crear_estudio') }}"
          class="bg-slate-800/60 border border-white/10 rounded-xl p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
                <label class="block text-xs text-slate-400 mb-1 font-medium">Nombre del Estudio *</label>
                <input type="text" name="nombre" required
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30"
                       placeholder="Ej: Estudio Contable Perez & Asociados">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Email del Estudio *</label>
                <input type="email" name="email" required
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                       placeholder="admin@estudio.com">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">CUIT</label>
                <input type="text" name="cuit"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                       placeholder="20-12345678-9">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Telefono</label>
                <input type="text" name="telefono"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                       placeholder="+54 11 1234-5678">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Domicilio</label>
                <input type="text" name="domicilio"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                       placeholder="Av. Corrientes 1234, CABA">
            </div>
        </div>

        <hr class="border-slate-700">

        <h3 class="text-sm font-semibold text-slate-300">Plan y Limites</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Plan</label>
                <select name="plan"
                        class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500">
                    <option value="trial">TRIAL</option>
                    <option value="basico">BASICO</option>
                    <option value="profesional" selected>PROFESIONAL</option>
                    <option value="enterprise">ENTERPRISE</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Vencimiento membresia</label>
                <input type="date" name="membresia_hasta"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Max clientes</label>
                <input type="number" name="max_clientes" value="10"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Max usuarios</label>
                <input type="number" name="max_usuarios" value="2"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Max consultas/mes</label>
                <input type="number" name="max_consultas_mes" value="100"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500">
            </div>
        </div>

        <hr class="border-slate-700">

        <h3 class="text-sm font-semibold text-slate-300">Usuario Administrador del Estudio</h3>
        <p class="text-xs text-slate-500">Se creara un usuario con rol <strong class="text-blue-400">admin</strong> para este estudio.</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Nombre completo *</label>
                <input type="text" name="admin_nombre" required
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                       placeholder="Juan Perez">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1 font-medium">Email del admin *</label>
                <input type="email" name="admin_email" required
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                       placeholder="juan@estudio.com">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs text-slate-400 mb-1 font-medium">Contrasena inicial *</label>
                <input type="password" name="admin_password" required minlength="8"
                       class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                       placeholder="Minimo 8 caracteres">
            </div>
        </div>

        <div>
            <label class="block text-xs text-slate-400 mb-1 font-medium">Notas internas</label>
            <textarea name="notas_admin" rows="2"
                      class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2.5 text-sm focus:border-blue-500"
                      placeholder="Notas visibles solo para el superadmin..."></textarea>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg text-sm font-bold hover:bg-blue-700 transition">
            Crear Estudio
        </button>
    </form>
</div>
{% endblock %}
