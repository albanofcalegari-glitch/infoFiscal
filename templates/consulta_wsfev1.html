<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta WSFEv1 - InfoFiscal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #3b82f6;
            border-radius: 50%; animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900">

    <div class="fixed inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1556742044-3c52d6e88c62?auto=format&fit=crop&w=1920&q=80"
             alt="" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-slate-900/60"></div>
    </div>

    <header class="relative z-10 bg-slate-900/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-lg font-bold text-white tracking-wide">InfoFiscal</h1>
            <a href="{{ url_for('home') }}" class="text-sm text-slate-300 hover:text-white transition">&larr; Volver al inicio</a>
        </div>
    </header>

    <main class="relative z-10 max-w-2xl mx-auto px-4 py-8">

        <h2 class="text-2xl font-bold text-white mb-2">Consulta WSFEv1</h2>
        <p class="text-slate-300 text-sm mb-6">Facturas Electronicas tradicionales</p>

        {% if cliente %}
        <div class="glass rounded-xl p-4 mb-4 border border-white/40">
            <span class="font-semibold text-slate-800">{{ cliente.get('razon_social', cliente.get('nombre', '')) }}</span>
            {% if cliente.get('cuit') or cliente.get('CUIT') %}
            <span class="text-sm text-slate-500 ml-2">&mdash; CUIT: {{ cliente.get('cuit') or cliente.get('CUIT') }}</span>
            {% endif %}
        </div>
        {% endif %}

        <div class="glass rounded-xl shadow-xl p-6 mb-6 border border-white/40">
            <div class="flex gap-3">
                <div class="flex-[2]">
                    <label for="cuit" class="block text-sm font-medium text-slate-700 mb-1">CUIT</label>
                    <input type="text" id="cuit" placeholder="Ej: 20321518045" maxlength="11"
                           value="{{ (cliente.get('cuit') or cliente.get('CUIT', '')) if cliente else '' }}"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex-1">
                    <label for="limite" class="block text-sm font-medium text-slate-700 mb-1">Limite por tipo</label>
                    <input type="number" id="limite" value="50" min="1" max="500"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <button onclick="buscarFacturas()" id="btnBuscar"
                    class="w-full mt-4 bg-blue-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                Buscar facturas
            </button>
        </div>

        <div id="resultado"></div>
    </main>

    <script>
    async function buscarFacturas() {
        const cuit = document.getElementById('cuit').value.replace(/[-\s]/g, '');
        const limite = document.getElementById('limite').value;
        const resultado = document.getElementById('resultado');
        const btn = document.getElementById('btnBuscar');

        if (!cuit || cuit.length !== 11) {
            resultado.innerHTML = '<p class="text-sm text-red-400">CUIT debe tener 11 digitos.</p>';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Buscando...';
        resultado.innerHTML = '<div class="text-center text-sm text-slate-300 py-6"><span class="spinner"></span>Consultando AFIP WSFEv1...</div>';

        try {
            const resp = await fetch(`/buscar-facturas-wsfev1?cuit=${cuit}&limite=${limite}`);
            const data = await resp.json();

            if (!resp.ok || !data.success) {
                resultado.innerHTML = `<p class="text-sm text-red-400">${data.error || 'Error en la consulta'}</p>`;
                return;
            }

            if (data.total_facturas === 0) {
                resultado.innerHTML = '<p class="text-sm text-slate-400">No se encontraron facturas para este CUIT.</p>';
                return;
            }

            let html = `<p class="text-sm font-medium text-slate-200 mb-3">${data.total_facturas} factura(s) encontrada(s)</p>`;
            html += '<div class="glass rounded-xl border border-white/40 overflow-hidden"><table class="w-full text-sm"><thead><tr class="bg-slate-800 text-white text-left"><th class="px-4 py-3 font-medium">Tipo</th><th class="px-4 py-3 font-medium">PV</th><th class="px-4 py-3 font-medium">Numero</th><th class="px-4 py-3 font-medium">Fecha</th><th class="px-4 py-3 font-medium text-right">Importe</th></tr></thead><tbody class="divide-y divide-slate-100">';

            const facturas = data.facturas_por_tipo || {};
            for (const tipo in facturas) {
                for (const f of facturas[tipo]) {
                    const d = f.datos || f;
                    html += `<tr class="hover:bg-slate-50/50 transition">
                        <td class="px-4 py-2.5 text-slate-700">${d.tipo_comprobante || tipo}</td>
                        <td class="px-4 py-2.5 text-slate-700">${d.punto_venta || '-'}</td>
                        <td class="px-4 py-2.5 text-slate-700">${d.numero_comprobante || '-'}</td>
                        <td class="px-4 py-2.5 text-slate-700">${d.fecha_emision || '-'}</td>
                        <td class="px-4 py-2.5 text-slate-700 text-right">${d.importe_total ? '$' + Number(d.importe_total).toLocaleString('es-AR') : '-'}</td>
                    </tr>`;
                }
            }
            html += '</tbody></table></div>';
            resultado.innerHTML = html;
        } catch (e) {
            resultado.innerHTML = `<p class="text-sm text-red-400">Error de conexion: ${e.message}</p>`;
        } finally {
            btn.disabled = false;
            btn.textContent = 'Buscar facturas';
        }
    }
    </script>
</body>
</html>
