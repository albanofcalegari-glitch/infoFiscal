<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta WSMTXCA - InfoFiscal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #3b82f6;
            border-radius: 50%; animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900">

    <div class="fixed inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1556742044-3c52d6e88c62?auto=format&fit=crop&w=1920&q=80"
             alt="" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-slate-900/60"></div>
    </div>

    <header class="relative z-10 bg-slate-900/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-lg font-bold text-white tracking-wide">InfoFiscal</h1>
            <a href="{{ url_for('home') }}" class="text-sm text-slate-300 hover:text-white transition">&larr; Volver al inicio</a>
        </div>
    </header>

    <main class="relative z-10 max-w-4xl mx-auto px-4 py-8">

        <h2 class="text-2xl font-bold text-white mb-2">Consulta WSMTXCA</h2>
        <p class="text-slate-300 text-sm mb-6">Consultar comprobantes con codigos MTX de un cliente</p>

        <div class="glass rounded-xl shadow-xl p-6 mb-6 border border-white/40">
            <form id="consultaForm">
                <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-4">
                    <div class="sm:col-span-2">
                        <label for="cuit" class="block text-sm font-medium text-slate-700 mb-1">CUIT del Cliente</label>
                        <input type="text" id="cuit" name="cuit" placeholder="Ej: 20123456789" maxlength="11" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="puntoVenta" class="block text-sm font-medium text-slate-700 mb-1">Punto de Venta</label>
                        <input type="number" id="puntoVenta" name="punto_venta" min="1" max="9999" placeholder="Todos"
                               class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="limite" class="block text-sm font-medium text-slate-700 mb-1">Limite por tipo</label>
                        <select id="limite" name="limite"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="10">10 ultimos</option>
                            <option value="25" selected>25 ultimos</option>
                            <option value="50">50 ultimos</option>
                            <option value="100">100 ultimos</option>
                        </select>
                    </div>
                </div>

                <div class="text-xs text-slate-500 bg-slate-50 rounded-lg p-3 mb-4">
                    Se consultaran automaticamente: Facturas A/B/C, Notas de Debito/Credito, Monotributo, FCE MiPyMEs
                </div>

                <button type="submit" id="btnConsultar"
                        class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    Buscar Todos los Comprobantes
                </button>
            </form>
        </div>

        <div id="resultadoContainer" class="hidden"></div>
    </main>

    <script>
        document.getElementById('consultaForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btnConsultar = document.getElementById('btnConsultar');
            const container = document.getElementById('resultadoContainer');
            const formData = new FormData(this);

            const cuit = formData.get('cuit').replace(/\D/g, '');
            if (cuit.length !== 11) { alert('El CUIT debe tener 11 digitos'); return; }

            const puntoVenta = formData.get('punto_venta') || '';
            const limite = formData.get('limite') || '25';

            btnConsultar.disabled = true;
            btnConsultar.innerHTML = '<span class="spinner"></span>Buscando...';
            container.classList.remove('hidden');
            container.innerHTML = '<div class="text-center text-sm text-slate-300 py-6"><span class="spinner"></span>Consultando todos los tipos de comprobantes en AFIP WSMTXCA...</div>';

            try {
                const params = new URLSearchParams({ cuit, limite });
                if (puntoVenta) params.append('punto_venta', puntoVenta);

                const response = await fetch(`/buscar-wsmtxca-completo?${params.toString()}`);
                const data = await response.json();
                mostrarResultadoCompleto(data);
            } catch (error) {
                container.innerHTML = `<div class="glass rounded-xl p-4 border border-red-200"><p class="text-sm text-red-600">Error de conexion: ${error.message}</p></div>`;
            } finally {
                btnConsultar.disabled = false;
                btnConsultar.textContent = 'Buscar Todos los Comprobantes';
            }
        });

        function mostrarResultadoCompleto(data) {
            const container = document.getElementById('resultadoContainer');

            if (!data.success) {
                container.innerHTML = `<div class="glass rounded-xl p-4 border border-red-200"><p class="text-sm text-red-600">Error: ${data.error}${data.detalle ? '<br><span class="text-xs">' + data.detalle + '</span>' : ''}</p></div>`;
                return;
            }

            const resultados = data.resultados || [];
            const total_encontrados = resultados.filter(r => r.status === 'encontrado').length;

            let html = `<div class="glass rounded-xl p-4 mb-4 border border-green-200"><p class="text-sm text-green-700">Busqueda completada &mdash; ${total_encontrados} comprobantes encontrados (${data.consultas_realizadas || resultados.length} consultas)</p></div>`;

            if (total_encontrados === 0) {
                html += `<div class="glass rounded-xl p-6 text-center border border-white/40"><p class="text-sm text-slate-500">No se encontraron comprobantes WSMTXCA para el CUIT ${data.cuit}</p></div>`;
            } else {
                const porTipo = {};
                resultados.filter(r => r.status === 'encontrado').forEach(r => {
                    const tipo = r.consulta.tipo;
                    if (!porTipo[tipo]) porTipo[tipo] = [];
                    porTipo[tipo].push(r);
                });

                for (const [tipo, comprobantes] of Object.entries(porTipo)) {
                    const nombreTipo = getNombreTipo(parseInt(tipo));
                    html += `<div class="glass rounded-xl p-5 mb-4 border border-white/40">
                        <h3 class="font-semibold text-slate-800 mb-3 pb-2 border-b border-slate-200">${nombreTipo} (${comprobantes.length})</h3>
                        <div class="space-y-3">`;

                    comprobantes.forEach(comp => {
                        const datos = comp.datos;
                        const items = comp.items || [];
                        html += `<div class="bg-slate-50 rounded-lg p-4">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-medium text-slate-800">PV ${datos.punto_venta} - N. ${datos.numero_comprobante}</span>
                                <span class="text-sm font-semibold text-slate-700">$${datos.importe_total || '0'}</span>
                            </div>
                            <div class="text-xs text-slate-500 space-y-0.5">
                                <div>CAE: ${datos.cae || 'N/A'} &mdash; ${datos.fecha_emision || 'N/A'}</div>
                                <div>Receptor: ${datos.receptor_denominacion || 'N/A'} &mdash; Items: ${datos.cantidad_items || items.length || 0}</div>
                            </div>
                            ${items.length > 0 ? `<div class="mt-2 pt-2 border-t border-slate-200">
                                ${items.slice(0, 3).map(item => `<div class="text-xs text-slate-600"><span class="font-mono bg-slate-200 px-1 rounded text-[11px]">${item.codigo_mtx || 'N/A'}</span> ${item.descripcion || 'N/A'} - $${item.importe_total || '0'}</div>`).join('')}
                                ${items.length > 3 ? `<div class="text-xs text-slate-400">... y ${items.length - 3} mas</div>` : ''}
                            </div>` : ''}
                        </div>`;
                    });

                    html += `</div></div>`;
                }
            }

            container.innerHTML = html;
        }

        function getNombreTipo(tipo) {
            const tipos = {
                1: "Factura A", 2: "Nota de Debito A", 3: "Nota de Credito A",
                6: "Factura B", 7: "Nota de Debito B", 8: "Nota de Credito B",
                11: "Factura C", 51: "Factura M (Monotributo)", 52: "Nota de Debito M",
                53: "Nota de Credito M", 201: "FCE A (MiPyMEs)", 206: "FCE B (MiPyMEs)"
            };
            return tipos[tipo] || `Tipo ${tipo}`;
        }

        document.getElementById('cuit').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            e.target.value = value;
        });
    </script>
</body>
</html>
