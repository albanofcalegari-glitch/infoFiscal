services:
  db:
    image: postgres:16-alpine
    container_name: infofiscal_db
    environment:
      POSTGRES_DB: infofiscal
      POSTGRES_USER: infofiscal
      POSTGRES_PASSWORD: local_dev_only
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: